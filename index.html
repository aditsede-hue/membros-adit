<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Consulta de Membros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .header-logo {
            width: 120px;
            height: auto;
            flex-shrink: 0;
        }

        .header-content {
            text-align: left;
            flex: 1;
        }

        .header h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
        }

        /* Dashboard Cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 4px solid #667eea;
        }

        .card:nth-child(1) {
            border-top-color: #3b82f6;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
        }

        .card:nth-child(1) .card-label,
        .card:nth-child(1) .card-value {
            color: white;
        }

        .card:nth-child(2) {
            border-top-color: #fbbf24;
            background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%);
            color: #333;
        }

        .card:nth-child(2) .card-label,
        .card:nth-child(2) .card-value {
            color: #333;
        }

        .card:nth-child(3) {
            border-top-color: #3b82f6;
            background: white;
            color: #333;
        }

        .card:nth-child(3) .card-label,
        .card:nth-child(3) .card-value {
            color: #333;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .card-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .card-label {
            color: #666;
            font-size: 0.95em;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .card-link:hover {
            background: #f8f9ff;
        }

        /* Search Section */
        .search-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .search-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .search-btn:hover {
            background: #5568d3;
        }

        .clear-btn {
            padding: 12px 30px;
            background: #999;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .clear-btn:hover {
            background: #777;
        }

        /* Search Results */
        .search-results {
            display: none;
            margin-top: 30px;
        }

        .search-results.show {
            display: block;
        }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .result-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .result-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 15px;
            margin-bottom: 12px;
            align-items: start;
        }

        .result-label {
            font-weight: bold;
            color: #667eea;
        }

        .result-value {
            color: #666;
            word-wrap: break-word;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 30px;
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-content {
                text-align: center;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .search-container {
                flex-direction: column;
            }

            .search-input,
            .search-btn,
            .clear-btn {
                width: 100%;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="./src/logo.png" alt="Logo ADIT" class="header-logo">
            <div class="header-content">
                <h1>📋 Portal de Consulta de Membros <span style="font-size: 1.2em; font-weight: bold; color: #ffd700;">ADIT</span></h1>
                <p>Secretaria Geral – Verificação de Cadastro</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">
            <div class="card">
                <div class="card-icon">🏘️</div>
                <div class="card-value">9</div>
                <div class="card-label">Congregações</div>
            </div>
            <a href="https://igrejaadit.com/cadastro-de-membros-3/" target="_blank" class="card card-link">
                <div class="card-icon">📄</div>
                <div class="card-label">Atualizar Dados</div>
                <div style="font-size: 0.8em; margin-top: 5px; opacity: 0.7;">Clique aqui</div>
            </a>
            <a href="https://igrejaadit.com/cadastro-de-membros-3/" target="_blank" class="card card-link">
                <div class="card-icon">➕</div>
                <div class="card-label">Se Cadastrar</div>
                <div style="font-size: 0.8em; margin-top: 5px; opacity: 0.7;">Clique aqui</div>
            </a>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h2>🔍 Buscar Membro</h2>
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Digite o nome ou matrícula do membro..."
                >
                <button class="search-btn" onclick="searchMember()">Buscar</button>
                <button class="clear-btn" onclick="clearSearch()">Limpar</button>
            </div>
        </div>

        <div class="search-results" id="searchResults"></div>



        <!-- Footer -->
        <div class="footer">
            <p>© 2026 Secretaria Geral. Todos os direitos reservados.</p>
            <p>Portal de Consulta de Membros - Dados protegidos e confidenciais</p>
        </div>
    </div>

    <script>
        let membersData = [];
        let allMembers = [];

        // Load data
           async function loadData() {
            try {
                const response = await fetch('./src/members_data.json');
                membersData = await response.json();
                allMembers = [...membersData];
                initializeDashboard();
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        }

        // Initialize dashboard with statistics
        function initializeDashboard() {
            // Dashboard is now static with only congregations card
        }

        // Search member
        function searchMember() {
            const searchValue = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('searchResults');

            if (!searchValue) {
                resultsDiv.classList.remove('show');
                return;
            }

            const found = membersData.filter(m => 
                m.Nome.toLowerCase().includes(searchValue) || 
                m.Matrícula.includes(searchValue)
            );

            resultsDiv.innerHTML = '';

            if (found.length === 0) {
                resultsDiv.innerHTML = '<div class="error-message show">❌ Membro não localizado no cadastro da secretaria.</div>';
            } else {
                found.forEach(member => {
                    const resultCard = document.createElement('div');
                    resultCard.className = 'result-card';
                    
                    const age = calculateAge(member.Nascimento);
                    const ageText = age ? ` (${age} anos)` : '';
                    
                    resultCard.innerHTML = `
                        <h3>${member.Nome}</h3>
                        <div class="result-row">
                            <div class="result-label">Matrícula:</div>
                            <div class="result-value">${member.Matrícula}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">Congregação:</div>
                            <div class="result-value">${member.Congregação || 'Não informado'}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">Cargo/Ministério:</div>
                            <div class="result-value">${member.Cargo || 'Não informado'}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">Data de Nascimento:</div>
                            <div class="result-value">${member.Nascimento || 'Não informado'}${ageText}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">Telefone:</div>
                            <div class="result-value">${maskPhone(member.Telefone)}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">E-mail:</div>
                            <div class="result-value">${member.Email || 'Não informado'}</div>
                        </div>
                        <div class="result-row">
                            <div class="result-label">Endereço:</div>
                            <div class="result-value">${member.Endereço || 'Não informado'}</div>
                        </div>
                    `;
                    resultsDiv.appendChild(resultCard);
                });
            }
            resultsDiv.classList.add('show');
        }

        // Mask phone number - show only last 4 digits
        function maskPhone(phone) {
            if (!phone) return 'Não informado';
            const phoneStr = phone.toString().trim();
            if (phoneStr.length < 4) return phoneStr;
            return '*'.repeat(phoneStr.length - 4) + phoneStr.slice(-4);
        }

        // Calculate age from birth date
        function calculateAge(birthDate) {
            if (!birthDate) return null;
            try {
                const [day, month, year] = birthDate.split('/');
                const birth = new Date(year, month - 1, day);
                const today = new Date();
                let age = today.getFullYear() - birth.getFullYear();
                const monthDiff = today.getMonth() - birth.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                    age--;
                }
                return age;
            } catch (e) {
                return null;
            }
        }

        // Clear search
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.remove('show');
            document.getElementById('searchResults').innerHTML = '';
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
